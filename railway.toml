[build]
dockerfilePath = "Dockerfile"

[deploy]
# Run migrations and collect static files before gunicorn starts.
# $PORT is injected by Railway automatically — do not hardcode it.
startCommand = "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --timeout 120 --workers 2"
